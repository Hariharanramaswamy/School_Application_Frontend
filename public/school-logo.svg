<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0A2A66;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Shield -->
  <path d="M100 15 L170 45 L170 105 Q170 155 100 190 Q30 155 30 105 L30 45 Z" fill="url(#shieldGrad)" stroke="#ffffff" stroke-width="3"/>
  <!-- Inner shield border -->
  <path d="M100 28 L158 53 L158 103 Q158 147 100 177 Q42 147 42 103 L42 53 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Open Book -->
  <g transform="translate(100,80)">
    <path d="M-30 10 Q-30 -10 0 -15 Q30 -10 30 10 L25 10 Q25 -5 0 -10 Q-25 -5 -25 10 Z" fill="#ffffff" opacity="0.9"/>
    <line x1="0" y1="-15" x2="0" y2="10" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <line x1="-20" y1="-3" x2="-5" y2="-7" stroke="rgba(10,42,102,0.3)" stroke-width="0.8"/>
    <line x1="-20" y1="1" x2="-5" y2="-3" stroke="rgba(10,42,102,0.3)" stroke-width="0.8"/>
    <line x1="5" y1="-7" x2="20" y2="-3" stroke="rgba(10,42,102,0.3)" stroke-width="0.8"/>
    <line x1="5" y1="-3" x2="20" y2="1" stroke="rgba(10,42,102,0.3)" stroke-width="0.8"/>
  </g>
  <!-- Star above book -->
  <polygon points="100,50 103,58 112,58 105,63 108,72 100,67 92,72 95,63 88,58 97,58" fill="#FFD700"/>
  <!-- AMJS text -->
  <text x="100" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#ffffff" letter-spacing="4">AMJS</text>
  <!-- Decorative line -->
  <line x1="65" y1="135" x2="135" y2="135" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <!-- Sub text -->
  <text x="100" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.8)" letter-spacing="2">EXCELLENCE</text>
</svg>
